name: Daily Activity

on:
  schedule:
    - cron: "0 13 * * 1"   # Lunes     1pm UTC
    - cron: "0 15 * * 2"   # Martes    3pm UTC
    - cron: "0 11 * * 3"   # Miércoles 11am UTC
    - cron: "0 14 * * 5"   # Viernes   2pm UTC
    - cron: "0 12 * * 6"   # Sábado    12pm UTC
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Make varied commits
        run: |
          # Usar el email noreply de GitHub — garantizado vinculado a la cuenta
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

          mkdir -p .github/activity

          # Entre 2 y 8 commits por ejecución
          COUNT=$(( (RANDOM % 7) + 2 ))
          echo "Haciendo $COUNT commits"

          MESSAGES=(
            "chore: update dependencies check"
            "chore: review build config"
            "fix: minor cleanup"
            "chore: sync activity log"
            "chore: routine maintenance"
            "fix: formatting pass"
            "chore: update project notes"
            "chore: verify environment"
            "fix: small adjustments"
            "chore: daily review"
            "chore: check integrations"
            "fix: lint pass"
            "chore: update changelog"
            "fix: code style"
            "chore: dependency audit"
            "fix: minor refactor"
            "chore: build verification"
            "fix: cleanup unused vars"
          )

          for i in $(seq 1 $COUNT); do
            sleep 2
            TS=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            IDX=$(( RANDOM % ${#MESSAGES[@]} ))
            echo "$TS — ${MESSAGES[$IDX]}" >> .github/activity/log.txt
            git add .github/activity/log.txt
            git commit -m "${MESSAGES[$IDX]}"
          done

          git push
